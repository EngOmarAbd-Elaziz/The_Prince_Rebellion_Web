name: Deploy Blazor WASM to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x' # أو النسخة اللي بتستخدمها 8.0.x / 9.0.x

    - name: Publish Blazor App
      run: dotnet publish AdventureGameWeb.csproj -c Release -o release/wwwroot
      # ملاحظة: غير AdventureGameWeb/AdventureGameWeb.csproj لمسار فايل الـ csproj عندك بالضبط

    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./release/wwwroot
        vercel-args: '--prod'
